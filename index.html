<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>研究室討論預約系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', 'Noto Sans TC', sans-serif;
      background-color: #f8fafc;
    }
    .tag-active {
      background-color: #0f172a;
      color: #ffffff;
      border-color: #0f172a;
    }
  </style>
</head>
<body class="text-[#1c1c1e] antialiased min-h-screen">

  <div class="bg-[#EFF6FF] border-b border-[#BFDBFE] text-[#1E40AF] px-4 py-3 text-center text-sm font-medium">
    📢 系統公告：預約資料現已成功與雲端資料庫即時同步，請放心填寫。
  </div>

  <div class="max-w-6xl mx-auto px-4 py-10 grid grid-cols-1 lg:grid-cols-12 gap-8">
    
    <div class="lg:col-span-7 space-y-8">
      <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
            🛸 UFO 月曆光束
          </h2>
          <div class="text-sm font-medium text-slate-500" id="currentMonthYear">June 2026</div>
        </div>
        
        <div class="grid grid-cols-7 gap-2 text-center text-xs font-semibold text-slate-400 mb-2">
          <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
        </div>
        <div class="grid grid-cols-7 gap-2" id="calendarGrid">
          </div>
      </div>

      <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
        <h2 class="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2">
          📅 預約行程總覽
        </h2>
        <div id="bookingList" class="space-y-3">
          <p class="text-slate-400 text-sm py-4 text-center">正在從雲端載入預約紀錄...</p>
        </div>
      </div>
    </div>

    <div class="lg:col-span-5">
      <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 sticky top-6">
        <h2 class="text-xl font-bold text-slate-800 mb-6">填寫預約表單</h2>
        
        <form id="bookingForm" onsubmit="handleFormSubmit(event)" class="space-y-6">
          
          <div class="space-y-2">
            <label class="block text-xs font-bold text-slate-400 tracking-wider">姓名 SELECT PERSON <span class="text-rose-500">*</span></label>
            <input type="text" id="nameInput" required placeholder="請輸入您的姓名 (例如: 趙怡潔)" 
                   class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-sm transition-all">
          </div>

          <div class="space-y-2">
            <label class="block text-xs font-bold text-slate-400 tracking-wider">日期 DATE <span class="text-rose-500">*</span></label>
            <input type="date" id="dateInput" required
                   class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-sm transition-all">
          </div>

          <div class="space-y-2">
            <label class="block text-xs font-bold text-slate-400 tracking-wider">時段 SELECT TIME <span class="text-rose-500">*</span></label>
            <div class="grid grid-cols-1 gap-2">
              <button type="button" type-slot="18:00 - 19:00" class="time-btn w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-left text-sm font-medium hover:bg-slate-100 transition-all flex justify-between items-center">
                <span>18:00 - 19:00</span>
                <span class="text-xs bg-emerald-50 text-emerald-600 px-2 py-1 rounded-md font-normal">剩餘 60 分鐘</span>
              </button>
              <button type="button" type-slot="19:00 - 20:00" class="time-btn w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-left text-sm font-medium hover:bg-slate-100 transition-all flex justify-between items-center">
                <span>19:00 - 20:00</span>
                <span class="text-xs bg-emerald-50 text-emerald-600 px-2 py-1 rounded-md font-normal">剩餘 60 分鐘</span>
              </button>
              <button type="button" type-slot="20:00 - 21:00" class="time-btn w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-left text-sm font-medium hover:bg-slate-100 transition-all flex justify-between items-center">
                <span>20:00 - 21:00</span>
                <span class="text-xs bg-emerald-50 text-emerald-600 px-2 py-1 rounded-md font-normal">剩餘 60 分鐘</span>
              </button>
            </div>
          </div>

          <div class="space-y-2">
            <label class="block text-xs font-bold text-slate-400 tracking-wider">耗時 DURATION <span class="text-rose-500">*</span></label>
            <select id="durationInput" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-sm transition-all text-slate-700 font-medium">
              <option value="20 分鐘">20 分鐘</option>
              <option value="40 分鐘">40 分鐘</option>
              <option value="60 分鐘">60 分鐘</option>
            </select>
          </div>

          <div class="space-y-2">
            <label class="block text-xs font-bold text-slate-400 tracking-wider">討論內容 (可複選) TOPIC</label>
            <div class="flex flex-wrap gap-2" id="topicTagsGroup">
              <button type="button" class="tag-btn px-4 py-2 bg-slate-50 border border-slate-200 rounded-full text-xs font-medium text-slate-600 hover:border-slate-300 transition-all">計劃執行</button>
              <button type="button" class="tag-btn px-4 py-2 bg-slate-50 border border-slate-200 rounded-full text-xs font-medium text-slate-600 hover:border-slate-300 transition-all">生涯</button>
              <button type="button" class="tag-btn px-4 py-2 bg-slate-50 border border-slate-200 rounded-full text-xs font-medium text-slate-600 hover:border-slate-300 transition-all">純聊天</button>
              <button type="button" class="tag-btn px-4 py-2 bg-slate-50 border border-slate-200 rounded-full text-xs font-medium text-slate-600 hover:border-slate-300 transition-all">碩博論</button>
              <button type="button" class="tag-btn px-4 py-2 bg-slate-50 border border-slate-200 rounded-full text-xs font-medium text-slate-600 hover:border-slate-300 transition-all">研討會或期刊</button>
              <button type="button" class="tag-btn px-4 py-2 bg-slate-50 border border-slate-200 rounded-full text-xs font-medium text-slate-600 hover:border-slate-300 transition-all">設計或競賽</button>
              <button type="button" class="tag-btn px-4 py-2 bg-slate-50 border border-slate-200 rounded-full text-xs font-medium text-slate-600 hover:border-slate-300 transition-all">其他備註</button>
            </div>
          </div>

          <div class="space-y-2">
            <label class="block text-xs font-bold text-slate-400 tracking-wider">備註 NOTE</label>
            <textarea id="noteInput" rows="2" placeholder="例：報 paper、口考準備 (選填)" 
                      class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-sm transition-all resize-none"></textarea>
          </div>

          <button type="submit" id="submitBtn" class="w-full py-4 bg-slate-900 hover:bg-slate-800 text-white font-semibold rounded-xl transition-all shadow-md active:scale-[0.99]">
            送出預約
          </button>

        </form>
      </div>
    </div>

  </div>

  <div id="alertBox" class="fixed bottom-5 right-5 z-50 hidden max-w-sm w-full rounded-xl p-4 shadow-lg flex items-start gap-3 border bg-emerald-50 border-emerald-200 text-emerald-800">
    <div id="alertText" class="text-sm font-medium"></div>
    <button onclick="document.getElementById('alertBox').classList.add('hidden')" class="ml-auto text-xs font-bold">✕</button>
  </div>

  <script>
    // 您的 Google Apps Script 專屬通道網址
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzkDyiK9tqLedqp7oAUA-CF4u3oUPoJX2IMd_JD7S3PrqdhTrotfpYkOyorYsoGjFpl/exec";
    
    let bookings = [];
    let selectedTimeSlot = "";
    let selectedTopics = [];

    // 初始化網頁
    document.addEventListener("DOMContentLoaded", () => {
      // 預設日期設定
      const today = new Date().toISOString().split('T')[0];
      document.getElementById("dateInput").value = today;

      // 時段點擊綁定
      document.querySelectorAll(".time-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".time-btn").forEach(b => b.classList.remove("border-blue-500", "bg-blue-50/50", "ring-2", "ring-blue-500/10"));
          btn.classList.add("border-blue-500", "bg-blue-50/50", "ring-2", "ring-blue-500/10");
          selectedTimeSlot = btn.getAttribute("type-slot");
        });
      });

      // 標籤複選點擊綁定
      document.querySelectorAll(".tag-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const topicName = btn.innerText;
          if (selectedTopics.includes(topicName)) {
            selectedTopics = selectedTopics.filter(t => t !== topicName);
            btn.classList.remove("tag-active");
          } else {
            selectedTopics.push(topicName);
            btn.classList.add("tag-active");
          }
        });
      });

      // 初始化從雲端載入資料並畫出月曆
      fetchBookings();
      renderCalendar();
    });

    // 從 Google 雲端載入資料
    function fetchBookings() {
      fetch(SCRIPT_URL)
        .then(res => res.json())
        .then(data => {
          bookings = data;
          updateDashboard();
        })
        .catch(err => {
          console.error("雲端讀取失敗:", err);
          // 如果試算表還沒資料，顯示一個友善的初始化狀態
          const container = document.getElementById("bookingList");
          container.innerHTML = `<p class="text-slate-400 text-sm py-4 text-center">目前無雲端預約紀錄或正在初始化。</p>`;
        });
    }

    // 更新行程列表
    function updateDashboard() {
      const container = document.getElementById("bookingList");
      if (bookings.length === 0) {
        container.innerHTML = `<p class="text-slate-400 text-sm py-4 text-center">目前尚無預約紀錄。</p>`;
        return;
      }

      // 依時間排序
      bookings.sort((a, b) => (a.date + a.startTime).localeCompare(b.date + b.startTime));

      container.innerHTML = bookings.map(b => `
        <div class="p-4 bg-slate-50 border border-slate-100 rounded-xl flex justify-between items-start gap-4">
          <div class="space-y-1">
            <div class="flex items-center gap-2 flex-wrap">
              <span class="font-bold text-slate-800">${b.name}</span>
              <span class="text-xs bg-slate-200/60 text-slate-600 px-2 py-0.5 rounded">${b.date}</span>
              <span class="text-xs bg-blue-50 text-blue-600 border border-blue-100 px-2 py-0.5 rounded font-medium">${b.startTime} (${b.topic})</span>
            </div>
            <p class="text-xs text-slate-500">${b.note ? '📝 ' + b.note : '無備註描述'}</p>
          </div>
          <button onclick="deleteBooking('${b.id}')" class="text-xs font-medium text-rose-500 hover:text-rose-700 bg-rose-50 hover:bg-rose-100 px-2.5 py-1.5 rounded-lg transition-all shrink-0">
            刪除此筆
          </button>
        </div>
      `).join('');
    }

    // 處理表單送出 (核心：串接傳送至 Google 試算表)
    function handleFormSubmit(e) {
      e.preventDefault();
      
      const name = document.getElementById("nameInput").value.trim();
      const date = document.getElementById("dateInput").value;
      const note = document.getElementById("noteInput").value.trim();

      if (!selectedTimeSlot) {
        alert("請選擇一個預約時段！");
        return;
      }

      const submitBtn = document.getElementById("submitBtn");
      submitBtn.disabled = true;
      submitBtn.innerText = "正在傳送至雲端試算表...";

      const newBooking = {
        id: 'bk-' + Date.now(),
        name: name,
        date: date,
        startTime: selectedTimeSlot.split(" - ")[0],
        endTime: selectedTimeSlot.split(" - ")[1],
        topic: selectedTopics.length > 0 ? selectedTopics.join(', ') : "未分類",
        note: note
      };

      // 利用 POST 發送到您的 Google Apps Script 通道
      fetch(SCRIPT_URL, {
        method: "POST",
        mode: "no-cors", 
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(newBooking)
      })
      .then(() => {
        // 成功寫入雲端後，同步更新畫面
        bookings.push(newBooking);
        updateDashboard();
        
        // 彈出原始樣式的提示方塊
        const box = document.getElementById("alertBox");
        document.getElementById("alertText").innerText = "預約成功！已同步至雲端試算表。";
        box.classList.remove("hidden");
      })
      .catch(err => {
        console.error("傳送失敗:", err);
        alert("同步雲端失敗，請檢查網路連線。");
      })
      .finally(() => {
        submitBtn.disabled = false;
        submitBtn.innerText = "送出預約";
      });
    }

    // 本機模擬刪除項目
    function deleteBooking(id) {
      if(confirm("確定要刪除此筆預約嗎？")) {
        bookings = bookings.filter(b => b.id !== id);
        updateDashboard();
      }
    }

    // 生成月曆
    function renderCalendar() {
      const grid = document.getElementById("calendarGrid");
      let cells = "";
      for (let i = 1; i <= 30; i++) {
        const isSelected = i === 1 ? 'bg-blue-600 text-white font-bold ring-4 ring-blue-500/20' : 'bg-slate-50 text-slate-700 hover:bg-slate-100';
        cells += `
          <button type="button" class="aspect-square rounded-xl text-sm flex flex-col items-center justify-center transition-all ${isSelected}">
            <span>${i}</span>
          </button>
        `;
      }
      grid.innerHTML = cells;
    }
  </script>
</body>
</html>
